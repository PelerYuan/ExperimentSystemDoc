<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Experiment System Documentation</title>

  <!-- Docsify Vue theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Custom theme: dark/light variables + 14px font -->
  <link rel="stylesheet" href="theme.css">

  <style>
    .markdown-section img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    // Apply saved preferences before Docsify loads (prevents flash)
    (function () {
      var lang = localStorage.getItem('docsify-lang') || 'en';
      var theme = localStorage.getItem('docsify-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      window.__docsifyLangSuffix = lang === 'zh' ? '_zh' : '_en';
    })();

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('docsify-theme', theme);
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
      if (window.mermaid) {
        window.mermaid.initialize({
          startOnLoad: false,
          theme: theme === 'dark' ? 'dark' : 'default',
          securityLevel: 'loose',
        });
        var hash = window.location.hash;
        window.location.hash = '';
        window.location.hash = hash;
      }
    }

    function applyLang(lang) {
      localStorage.setItem('docsify-lang', lang);
      var suffix = lang === 'zh' ? '_zh' : '_en';
      window.__docsifyLangSuffix = suffix;
      window.$docsify.loadSidebar = '_sidebar' + suffix + '.md';
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      var btn = document.getElementById('lang-toggle');
      if (btn) btn.textContent = lang === 'zh' ? 'English' : '中文';
      var hash = window.location.hash.replace(/^#\//, '');
      var newPage = hash
        ? hash.replace(/_(en|zh)(\.md)/, suffix + '$2')
        : 'ExperimentSystem' + suffix + '.md';
      window.location.hash = '#/' + newPage;
    }

    window.$docsify = {
      name: 'Experiment System Documentation',
      repo: '',
      homepage: 'ExperimentSystem' + window.__docsifyLangSuffix + '.md',
      relativePath: true,
      loadSidebar: '_sidebar' + window.__docsifyLangSuffix + '.md',
      subMaxLevel: 2,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3,
      },
      mermaidConfig: {
        querySelector: '.mermaid',
      },
      auto2top: true,
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (document.getElementById('theme-toggle')) return;
            var nav = document.querySelector('.app-nav');
            if (!nav) return;

            var themeBtn = document.createElement('button');
            themeBtn.id = 'theme-toggle';
            var currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            themeBtn.textContent = currentTheme === 'dark' ? '☀ Light' : '☾ Dark';

            var langBtn = document.createElement('button');
            langBtn.id = 'lang-toggle';
            var currentLang = localStorage.getItem('docsify-lang') || 'en';
            langBtn.textContent = currentLang === 'zh' ? 'English' : '中文';

            nav.prepend(langBtn);
            nav.prepend(themeBtn);

            themeBtn.addEventListener('click', function () {
              var t = document.documentElement.getAttribute('data-theme');
              applyTheme(t === 'dark' ? 'light' : 'dark');
            });

            langBtn.addEventListener('click', function () {
              var l = localStorage.getItem('docsify-lang') || 'en';
              applyLang(l === 'en' ? 'zh' : 'en');
            });
          });
        },
      ],
    };
  </script>

  <!-- Docsify core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Image zoom plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <!-- Mermaid v10 (ESM) -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    var theme = document.documentElement.getAttribute('data-theme') || 'dark';
    mermaid.initialize({
      startOnLoad: false,
      theme: theme === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose',
    });
    window.mermaid = mermaid;
  </script>

  <!-- docsify-mermaid plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>

</body>
</html>
